<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaishnavi J - Professional Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: #f0f4f8;
            color: #333;
        }

        /* Header Section */
        .header {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            text-align: center;
            padding: 60px 20px;
        }

        .header .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: white;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #6a11cb;
            font-weight: bold;
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 36px;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            letter-spacing: 1px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .header .college {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* Badge Section */
        .badges {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .badge {
            background-color: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            letter-spacing: 1px;
        }

        /* Main Container */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Section Cards */
        .card {
            background-color: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border-left: 5px solid #6a11cb;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .card h2 {
            font-size: 22px;
            color: #6a11cb;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2 span {
            font-size: 24px;
        }

        .card p {
            font-size: 15px;
            line-height: 1.9;
            color: #555;
        }

        /* About Me Enhanced */
        .about-intro {
            font-size: 15px;
            line-height: 1.9;
            color: #555;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f8f4ff;
            border-radius: 10px;
            border-left: 4px solid #6a11cb;
        }

        /* Highlight Box */
        .highlight-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .highlight-box {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .highlight-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(106, 17, 203, 0.3);
        }

        .highlight-box .icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .highlight-box h3 {
            font-size: 18px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .highlight-box p {
            font-size: 13px;
            opacity: 0.9;
            line-height: 1.7;
            color: white;
        }

        /* Coaching Section */
        .coaching-section {
            margin-top: 20px;
        }

        .coaching-title {
            font-size: 18px;
            color: #6a11cb;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .coaching-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .coaching-item {
            background-color: #f8f4ff;
            border: 1px solid #e0d4f7;
            border-radius: 10px;
            padding: 18px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .coaching-item:hover {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            transform: translateY(-3px);
        }

        .coaching-item:hover p {
            color: white;
        }

        .coaching-item .c-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .coaching-item h4 {
            font-size: 14px;
            color: #6a11cb;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .coaching-item:hover h4 {
            color: white;
        }

        .coaching-item p {
            font-size: 12px;
            color: #777;
            line-height: 1.6;
        }

        /* Quote Box */
        .quote-box {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            border-radius: 12px;
            padding: 25px 30px;
            margin-top: 20px;
            text-align: center;
            font-style: italic;
            position: relative;
        }

        .quote-box::before {
            content: '"';
            font-size: 80px;
            position: absolute;
            top: -10px;
            left: 15px;
            opacity: 0.3;
            font-family: Georgia, serif;
        }

        .quote-box p {
            font-size: 16px;
            line-height: 1.8;
            color: white;
            z-index: 1;
            position: relative;
        }

        .quote-box .author {
            font-size: 13px;
            margin-top: 10px;
            opacity: 0.8;
            font-style: normal;
        }

        /* Puzzle Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background-color: #f8f4ff;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border: 2px solid #e0d4f7;
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            border-color: #6a11cb;
            background-color: #ede4ff;
        }

        .stat-box h3 {
            font-size: 32px;
            color: #6a11cb;
            font-weight: bold;
        }

        .stat-box p {
            font-size: 12px;
            color: #777;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        .info-item {
            background-color: #f8f4ff;
            border-radius: 10px;
            padding: 15px 20px;
            text-align: center;
            border: 1px solid #e0d4f7;
        }

        .info-item .icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .info-item h4 {
            font-size: 13px;
            color: #999;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-item p {
            font-size: 14px;
            color: #333;
            font-weight: bold;
        }

        /* Qualification Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        table th {
            background-color: #6a11cb;
            color: white;
            padding: 12px 15px;
            text-align: left;
            font-size: 14px;
        }

        table td {
            padding: 12px 15px;
            font-size: 14px;
            color: #555;
            border-bottom: 1px solid #f0e6ff;
        }

        table tr:nth-child(even) {
            background-color: #f8f4ff;
        }

        table tr:hover {
            background-color: #ede4ff;
        }

        /* Skills Section */
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .skill-tag {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: transform 0.2s ease;
        }

        .skill-tag:hover {
            transform: scale(1.05);
        }

        /* Experience Timeline */
        .timeline {
            position: relative;
            margin-top: 10px;
            padding-left: 20px;
            border-left: 3px solid #6a11cb;
        }

        .timeline-item {
            margin-bottom: 20px;
            position: relative;
        }

        .timeline-item::before {
            content: '';
            width: 14px;
            height: 14px;
            background-color: #6a11cb;
            border-radius: 50%;
            position: absolute;
            left: -27px;
            top: 4px;
        }

        .timeline-item h4 {
            font-size: 16px;
            color: #333;
            margin-bottom: 4px;
        }

        .timeline-item p {
            font-size: 14px;
            color: #777;
        }

        .timeline-item .year {
            display: inline-block;
            background-color: #f0e6ff;
            color: #6a11cb;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 5px;
        }

        /* Footer */
        .footer {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            text-align: center;
            padding: 25px;
            margin-top: 30px;
        }

        .footer p {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        /* Divider */
        .divider {
            height: 2px;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            border-radius: 5px;
            margin: 20px 0;
            opacity: 0.3;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 26px;
            }

            .card {
                padding: 20px;
            }

            .badges {
                flex-direction: column;
                align-items: center;
            }

            .stat-box h3 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <div class="header">
        <div class="avatar">VJ</div>
        <h1>Vaishnavi J</h1>
        <p>Mathematics Educator | Puzzle Solver | Aptitude Coach | Mentor</p>
        <p class="college">📍 PKDAS Liberal College of Arts and Science, Lakkidi Mangalam</p>
        <div class="badges">
            <span class="badge">🎓 M.Sc. Mathematics</span>
            <span class="badge">📚 M.Ed. Mathematics</span>
            <span class="badge">💼 2 Years Experience</span>
            <span class="badge">🧩 Puzzle Solver</span>
            <span class="badge">🧠 Aptitude Coach</span>
